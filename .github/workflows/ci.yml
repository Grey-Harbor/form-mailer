name: CI

on:
  push:
  pull_request:

permissions:
  contents: read
  id-token: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Test
        run: npm test

      - name: Pack check
        run: npm run pack:check

      - name: Publish to npm
        if: startsWith(github.ref, 'refs/tags/v')
        run: npm publish --provenance
